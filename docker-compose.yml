services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: repair_service
      POSTGRES_USER: repair_user
      POSTGRES_PASSWORD: repair_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repair_user -d repair_service"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
