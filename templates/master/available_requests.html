{% extends 'base.html' %}

{% block content %}
<h1>Доступные заявки</h1>

{% if requests %}
    <ul>
    {% for request in requests %}
        <li>
            Заявка #{{ request.pk }} - {{ request.client_name }} - {{ request.status }}
            <a href="{% url 'master:request-take' request.pk %}">Взять</a>
        </li>
    {% endfor %}
    </ul>
{% else %}
    <p>Нет доступных заявок.</p>
{% endif %}

<a href="{% url 'master:assigned-requests' %}">Мои заявки</a>
{% endblock %}
